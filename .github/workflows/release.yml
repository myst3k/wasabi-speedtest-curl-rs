name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: wasabi-speedtest-curl-linux-amd64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: wasabi-speedtest-curl-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: wasabi-speedtest-curl-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cp target/${{ matrix.target }}/release/wasabi-speedtest-curl .
          tar czf ${{ matrix.artifact }}.tar.gz wasabi-speedtest-curl

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"
